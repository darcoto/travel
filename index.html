<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Car Route Animator</title>
  <style>
    html, body, #map {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }
    #overlay {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      color: #111;
      padding: 12px 14px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      max-width: 380px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }
    #overlay h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }
    #overlay code {
      background: #f4f4f5;
      border-radius: 6px;
      padding: 2px 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }
    #overlay a { color: #0366d6; text-decoration: none; }
    #overlay a:hover { text-decoration: underline; }
    #status {
      margin-top: 8px;
      color: #333;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="overlay" hidden>
    <h3>Car Route Animator</h3>
    <div id="message"></div>
    <div id="status"></div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(location.search);
      const googleApiKey = params.get('key');
      const csvUrl = params.get('csv');
      const speedKmh = parseFloat(params.get('speedKmh') || '60');
      const travelModeParam = (params.get('mode') || 'DRIVING').toUpperCase();
      const travelMode = ['DRIVING','WALKING','BICYCLING','TRANSIT'].includes(travelModeParam) ? travelModeParam : 'DRIVING';

      const overlay = document.getElementById('overlay');
      const msg = document.getElementById('message');
      const statusEl = document.getElementById('status');

      function showOverlay(html) {
        overlay.hidden = false;
        msg.innerHTML = html;
      }

      function setStatus(text) {
        statusEl.textContent = text || '';
      }

      function escapeHtml(s) {
        return s.replace(/[&<>"]+/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
      }

      if (!googleApiKey || !csvUrl) {
        const example = location.origin + location.pathname + '?key=YOUR_API_KEY&csv=' + encodeURIComponent('https://example.com/cities.csv');
        showOverlay(
          'Provide Google Maps key and CSV URL in query params.<br><br>' +
          '<b>Required URL params</b>: <code>key</code>, <code>csv</code><br>' +
          '<b>Optional</b>: <code>speedKmh</code> (default 60), <code>mode</code> (DRIVING|WALKING|BICYCLING|TRANSIT).<br><br>' +
          '<b>CSV format</b>: each line is <code>Country, City</code> (no header).<br>' +
          'Example lines:<br>' +
          '<code>France, Paris</code><br>' +
          '<code>Germany, Berlin</code><br><br>' +
          'Example URL:<br><code>' + escapeHtml(example) + '</code>'
        );
        return;
      }

      overlay.hidden = false;
      setStatus('Loading Google Maps...');

      // Dynamically load Google Maps JS API with geometry library
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(googleApiKey)}&libraries=geometry&callback=initMap`;
      script.async = true;
      script.defer = true;
      script.onerror = function() {
        showOverlay('Failed to load Google Maps JS API. Check your <code>key</code>.');
      };
      document.head.appendChild(script);

      // Globals for map and services
      let map, geocoder, directionsService;
      let allLocations = [];
      let basePolyline, progressPolyline, carMarker;
      let animationFrameId = null;

      // For animation
      let fullPath = [];
      let segmentDistances = [];
      let cumulativeDistances = [];
      let totalDistanceMeters = 0;
      let animationStartTs = null;
      let metersPerSecond = Math.max(1, (speedKmh || 60) * 1000 / 3600);

      window.initMap = async function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
          center: { lat: 20, lng: 0 },
          zoom: 2,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: true,
        });
        geocoder = new google.maps.Geocoder();
        directionsService = new google.maps.DirectionsService();

        try {
          setStatus('Fetching CSV...');
          const lines = await fetchCsvLines(csvUrl);
          if (!lines.length) {
            showOverlay('CSV is empty. It should contain one entry per line: <code>Country, City</code>.');
            return;
          }

          setStatus('Geocoding cities...');
          const places = await geocodeAll(lines);
          if (places.length < 1) {
            showOverlay('No valid locations found from CSV.');
            return;
          }

          placeMarkers(places);
          fitToMarkers(places);

          if (places.length < 2) {
            setStatus('Only one location found. Nothing to route.');
            return;
          }

          setStatus('Requesting directions...');
          fullPath = await buildFullRoutePath(places);
          if (fullPath.length < 2) {
            showOverlay('Could not build a route between locations.');
            return;
          }

          drawRoutePolylines(fullPath);
          precomputeDistances(fullPath);

          setStatus('Animating...');
          startAnimation();
        } catch (err) {
          console.error(err);
          showOverlay('Error: ' + escapeHtml(String(err && err.message || err)));
        }
      };

      async function fetchCsvLines(url) {
        const resp = await fetch(url, { mode: 'cors' });
        if (!resp.ok) throw new Error(`Failed to fetch CSV (${resp.status})`);
        const text = await resp.text();
        const lines = text.split(/\r?\n/)
          .map(s => s.trim())
          .filter(Boolean);
        // Each line should be: Country, City (in that order as per spec)
        return lines;
      }

      function parseLineToQuery(line) {
        // Expect exactly two fields separated by comma
        const parts = line.split(',');
        if (parts.length < 2) return null;
        const country = parts[0].trim();
        const city = parts.slice(1).join(',').trim();
        if (!country || !city) return null;
        return `${city}, ${country}`; // geocode "City, Country"
      }

      async function geocodeAll(lines) {
        const results = [];
        const bounds = new google.maps.LatLngBounds();
        for (let i = 0; i < lines.length; i++) {
          const query = parseLineToQuery(lines[i]);
          if (!query) continue;
          setStatus(`Geocoding (${i+1}/${lines.length}): ${query}`);
          try {
            const place = await geocodeOne(query);
            if (place && place.location) {
              results.push(place);
              bounds.extend(place.location);
            }
          } catch (e) {
            console.warn('Geocode failed for', query, e);
          }
          // Gentle pacing to respect client-side geocoder limits
          await delay(200);
        }
        allLocations = results;
        return results;
      }

      function geocodeOne(address) {
        return new Promise((resolve, reject) => {
          geocoder.geocode({ address }, (res, status) => {
            if (status === 'OK' && res && res[0]) {
              const r = res[0];
              resolve({
                address: r.formatted_address,
                location: r.geometry.location,
              });
            } else {
              reject(new Error(`Geocode ${status}: ${address}`));
            }
          });
        });
      }

      function placeMarkers(places) {
        places.forEach((p, idx) => {
          new google.maps.Marker({
            position: p.location,
            map,
            title: p.address,
            label: String(idx + 1),
          });
        });
      }

      function fitToMarkers(places) {
        const bounds = new google.maps.LatLngBounds();
        places.forEach(p => bounds.extend(p.location));
        map.fitBounds(bounds);
      }

      async function buildFullRoutePath(places) {
        const path = [];
        for (let i = 0; i < places.length - 1; i++) {
          const origin = places[i].location;
          const destination = places[i + 1].location;
          const legPath = await requestRoute(origin, destination);
          if (i === 0) {
            path.push(...legPath);
          } else {
            // Avoid duplicating the joint point
            if (path.length && legPath.length) {
              const last = path[path.length - 1];
              const first = legPath[0];
              if (last && first && last.equals && last.equals(first)) {
                path.push(...legPath.slice(1));
              } else {
                path.push(...legPath);
              }
            } else {
              path.push(...legPath);
            }
          }
          // Pace direction calls a bit
          await delay(150);
        }
        return path;
      }

      function requestRoute(origin, destination) {
        return new Promise((resolve, reject) => {
          directionsService.route({
            origin,
            destination,
            travelMode: google.maps.TravelMode[travelMode],
            provideRouteAlternatives: false,
            optimizeWaypoints: false,
          }, (res, status) => {
            if (status === 'OK' && res && res.routes && res.routes[0]) {
              const route = res.routes[0];
              // Build a high-resolution path by concatenating step paths
              const pts = [];
              route.legs.forEach(leg => {
                leg.steps.forEach(step => {
                  const stepPath = step.path || [];
                  if (pts.length) {
                    // avoid repeating the first point if same as last
                    const last = pts[pts.length - 1];
                    if (last && stepPath.length && last.equals(stepPath[0])) {
                      pts.push(...stepPath.slice(1));
                    } else {
                      pts.push(...stepPath);
                    }
                  } else {
                    pts.push(...stepPath);
                  }
                });
              });
              resolve(pts);
            } else {
              reject(new Error(`Directions ${status}`));
            }
          });
        });
      }

      function drawRoutePolylines(path) {
        basePolyline = new google.maps.Polyline({
          path,
          strokeColor: '#4B5563',
          strokeOpacity: 0.5,
          strokeWeight: 5,
          map,
        });
        progressPolyline = new google.maps.Polyline({
          path: [path[0]],
          strokeColor: '#0EA5E9',
          strokeOpacity: 0.95,
          strokeWeight: 6,
          map,
        });

        // Car marker using a forward arrow symbol; rotate per heading
        carMarker = new google.maps.Marker({
          position: path[0],
          map,
          title: 'Car',
          icon: {
            path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
            scale: 5,
            strokeColor: '#111827',
            strokeOpacity: 0.9,
            strokeWeight: 2,
            fillColor: '#10B981',
            fillOpacity: 1,
            rotation: 0,
          },
          zIndex: 9999,
        });
      }

      function precomputeDistances(path) {
        segmentDistances = [];
        cumulativeDistances = [0];
        totalDistanceMeters = 0;
        for (let i = 0; i < path.length - 1; i++) {
          const d = google.maps.geometry.spherical.computeDistanceBetween(path[i], path[i+1]);
          segmentDistances.push(d);
          totalDistanceMeters += d;
          cumulativeDistances.push(totalDistanceMeters);
        }
      }

      function startAnimation() {
        cancelAnimation();
        animationStartTs = null;
        const path = fullPath;
        const mph = metersPerSecond;

        function step(ts) {
          if (!animationStartTs) animationStartTs = ts;
          const elapsedSec = (ts - animationStartTs) / 1000;
          const traveledMeters = Math.min(totalDistanceMeters, elapsedSec * mph);
          updateProgress(traveledMeters);
          if (traveledMeters < totalDistanceMeters) {
            animationFrameId = requestAnimationFrame(step);
          } else {
            setStatus('Animation finished.');
          }
        }
        animationFrameId = requestAnimationFrame(step);
      }

      function cancelAnimation() {
        if (animationFrameId != null) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }
      }

      function updateProgress(traveledMeters) {
        // Find the segment index for current traveled distance
        let idx = binarySearchCumulative(cumulativeDistances, traveledMeters);
        idx = Math.max(0, Math.min(idx, fullPath.length - 2));
        const segStartDist = cumulativeDistances[idx];
        const segLen = segmentDistances[idx] || 1;
        const t = Math.min(1, Math.max(0, (traveledMeters - segStartDist) / segLen));

        const p0 = fullPath[idx];
        const p1 = fullPath[idx + 1];
        const current = google.maps.geometry.spherical.interpolate(p0, p1, t);

        // Update progress polyline
        const progressedCount = idx + 1; // how many original points to include fully
        const subPath = fullPath.slice(0, progressedCount);
        subPath.push(current);
        progressPolyline.setPath(subPath);

        // Update car marker position and heading
        carMarker.setPosition(current);
        const heading = google.maps.geometry.spherical.computeHeading(p0, p1);
        const icon = carMarker.getIcon();
        if (icon && typeof icon === 'object') {
          const newIcon = Object.assign({}, icon, { rotation: heading });
          carMarker.setIcon(newIcon);
        }

        const pct = ((traveledMeters / totalDistanceMeters) * 100).toFixed(1);
        setStatus(`Animating: ${pct}%`);
      }

      function binarySearchCumulative(arr, value) {
        let lo = 0, hi = arr.length - 1;
        while (lo <= hi) {
          const mid = (lo + hi) >> 1;
          if (arr[mid] === value) return mid;
          if (arr[mid] < value) lo = mid + 1; else hi = mid - 1;
        }
        return Math.max(0, lo - 1);
      }

      function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
    })();
  </script>
</body>
</html>
